<!DOCTYPE html>
<html>

<head>
    <title>Day 4 — Video Call</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        video {
            border: 2px solid #333;
            margin: 10px;
            background: #000;
        }

        .error {
            color: red;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h2>Peer Video Call</h2>

    <input id="roomInput" placeholder="Room ID" />
    <button onclick="joinRoom()">Join</button>

    <div id="error" class="error"></div>

    <br><br>

    <div>
        <strong>Local Video:</strong><br>
        <video id="localVideo" autoplay muted playsinline width="400"></video>
    </div>

    <div>
        <strong>Remote Video:</strong><br>
        <video id="remoteVideo" autoplay playsinline width="400"></video>
    </div>

    <br><br>
    <hr>

    <h3>Frame Capture Pipeline</h3>

    <div>
        <button id="startCaptureBtn" onclick="startFrameCapture()">Start Capture</button>
        <button id="stopCaptureBtn" onclick="stopFrameCapture()" disabled>Stop Capture</button>

        <label>
            Interval (ms):
            <input id="intervalInput" type="number" value="200" min="100" max="1000" step="50" style="width: 80px;">
        </label>

        <label>
            <input id="showPreviewCheck" type="checkbox" checked> Show Preview
        </label>
    </div>

    <div id="captureStatus" style="margin: 10px 0; font-family: monospace; color: #666;">
        Status: Idle
    </div>

    <div id="previewContainer" style="margin-top: 10px;">
        <strong>Captured Frame Preview:</strong><br>
        <canvas id="previewCanvas" width="320" height="240" style="border: 2px solid #666; background: #000;"></canvas>
    </div>

    <br><br>
    <hr>

    <h3>AI Visual Detection Pipeline</h3>

    <div>
        <button id="loadModelBtn" onclick="loadAIModel()">Load AI Model</button>
        <button id="enableDetectionBtn" onclick="toggleDetection()" disabled>Enable Detection</button>

        <label>
            Threshold:
            <input id="thresholdInput" type="number" value="0.6" min="0.1" max="1.0" step="0.1" style="width: 60px;">
        </label>
    </div>

    <div id="modelStatus" style="margin: 10px 0; font-family: monospace; color: #666;">
        Model: Not Loaded
    </div>

    <div id="detectionResults"
        style="margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: #f9f9f9;">
        <strong>Latest Detection:</strong>
        <div id="predictions" style="font-family: monospace; margin-top: 5px;">
            No predictions yet
        </div>
    </div>

    <!-- TensorFlow.js and NSFWJS for AI Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://unpkg.com/nsfwjs@2.4.2/dist/nsfwjs.min.js"></script>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        const socket = io("http://localhost:3000");

        // ICE server configuration for NAT traversal
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        let localStream;
        let peer;
        let currentRoom;
        let mediaStarted = false;
        let peerCreated = false;

        // Register socket event listeners globally (not inside createPeer)
        socket.on("user-joined", async (remoteId) => {
            console.log("[SIGNAL] User joined:", remoteId);

            // Second user creates peer as initiator and sends offer
            if (!peerCreated) {
                await createPeer(true, remoteId);
            }
        });

        socket.on("signal", async (data) => {
            console.log("[SIGNAL] Received signal from:", data.from, "Type:", data.signal.sdp ? data.signal.sdp.type : "candidate");

            try {
                // Handle SDP (offer or answer)
                if (data.signal.sdp) {
                    // If we receive an offer and don't have a peer yet, create one as non-initiator
                    if (data.signal.sdp.type === "offer" && !peerCreated) {
                        console.log("[SIGNAL] Received offer, creating peer as non-initiator");
                        await createPeer(false, data.from);
                    }

                    // Set remote description
                    await peer.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                    console.log("[PEER] Remote description set");

                    // If it's an offer, create and send answer
                    if (data.signal.sdp.type === "offer") {
                        const answer = await peer.createAnswer();
                        await peer.setLocalDescription(answer);
                        console.log("[PEER] Answer created and sent");

                        socket.emit("signal", {
                            to: data.from,
                            signal: { sdp: peer.localDescription }
                        });
                    }
                }

                // Handle ICE candidate
                if (data.signal.candidate) {
                    if (peer && peer.remoteDescription) {
                        await peer.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
                        console.log("[ICE] Remote ICE candidate added");
                    } else {
                        console.warn("[ICE] Received candidate before remote description, queuing...");
                        // In production, you'd queue these candidates
                    }
                }
            } catch (error) {
                console.error("[ERROR] Signal handling error:", error);
                showError("Signaling error: " + error.message);
            }
        });

        async function startMedia() {
            if (mediaStarted) {
                console.log("[MEDIA] Media already started, skipping...");
                return;
            }

            console.log("[MEDIA] Starting media capture...");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });

                document.getElementById("localVideo").srcObject = localStream;
                mediaStarted = true;
                console.log("[MEDIA] Local stream ready");
            } catch (error) {
                console.error("[ERROR] getUserMedia error:", error);
                showError("Camera/microphone access denied: " + error.message);
                throw error;
            }
        }

        async function createPeer(isInitiator, remoteId) {
            if (peerCreated) {
                console.log("[PEER] Peer already created, skipping...");
                return;
            }

            console.log("[PEER] Creating peer connection (initiator:", isInitiator + ")");

            try {
                peer = new RTCPeerConnection(iceServers);
                peerCreated = true;

                // Add local tracks to peer connection
                localStream.getTracks().forEach(track => {
                    peer.addTrack(track, localStream);
                    console.log("[PEER] Added local track:", track.kind);
                });

                // ✅ FIX: Create a single MediaStream to accumulate all remote tracks
                let remoteStream = new MediaStream();
                const remoteVideo = document.getElementById("remoteVideo");

                // Handle incoming remote tracks
                peer.ontrack = (event) => {
                    console.log("[TRACK] Remote track received:", event.track.kind);

                    // Add track to our accumulated stream
                    remoteStream.addTrack(event.track);

                    // Set the stream only once (or update if needed)
                    if (!remoteVideo.srcObject) {
                        remoteVideo.srcObject = remoteStream;
                        console.log("[TRACK] Remote stream attached to video element");

                        // Ensure video plays (some browsers require explicit play)
                        remoteVideo.play().catch(err => {
                            console.warn("[TRACK] Autoplay prevented, user interaction needed:", err);
                        });
                    }

                    console.log("[TRACK] Total remote tracks:", remoteStream.getTracks().length);
                };

                // Handle ICE candidates
                peer.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log("[ICE] ICE candidate sent");
                        socket.emit("signal", {
                            to: remoteId,
                            signal: { candidate: event.candidate }
                        });
                    } else {
                        console.log("[ICE] All ICE candidates sent");
                    }
                };

                // Monitor connection state
                peer.onconnectionstatechange = () => {
                    console.log("[CONNECTION] Connection state:", peer.connectionState);

                    if (peer.connectionState === 'failed') {
                        console.error("[CONNECTION] Connection failed, may need to restart");
                    }

                    if (peer.connectionState === 'disconnected') {
                        console.warn("[CONNECTION] Connection disconnected");
                    }
                };

                peer.oniceconnectionstatechange = () => {
                    console.log("[CONNECTION] ICE connection state:", peer.iceConnectionState);

                    if (peer.iceConnectionState === "failed") {
                        console.error("[CONNECTION] ICE connection failed - check firewall/network");
                        showError("Connection failed. Please check your network.");
                    }

                    if (peer.iceConnectionState === "disconnected") {
                        console.warn("[CONNECTION] ICE connection disconnected - attempting to reconnect");
                    }

                    if (peer.iceConnectionState === "connected") {
                        console.log("[CONNECTION] ✅ ICE connection established successfully!");
                        clearError();
                    }
                };

                // Monitor ICE gathering state
                peer.onicegatheringstatechange = () => {
                    console.log("[ICE] ICE gathering state:", peer.iceGatheringState);
                };

                // Monitor signaling state
                peer.onsignalingstatechange = () => {
                    console.log("[PEER] Signaling state:", peer.signalingState);
                };
                // If initiator, create and send offer
                if (isInitiator) {
                    const offer = await peer.createOffer();
                    await peer.setLocalDescription(offer);
                    console.log("[PEER] Offer created and sent");

                    socket.emit("signal", {
                        to: remoteId,
                        signal: { sdp: peer.localDescription }
                    });
                }
            } catch (error) {
                console.error("[ERROR] Peer creation error:", error);
                showError("Peer connection error: " + error.message);
                peerCreated = false;
                throw error;
            }
        }

        async function joinRoom() {
            const room = document.getElementById("roomInput").value.trim();

            if (!room) {
                showError("Please enter a room ID");
                return;
            }

            console.log("[JOIN] Joining room:", room);
            currentRoom = room;

            try {
                // Start media first
                await startMedia();

                // Then join the room
                socket.emit("join-room", room);

                clearError();
            } catch (error) {
                console.error("[ERROR] Join room error:", error);
            }
        }

        function showError(message) {
            document.getElementById("error").textContent = message;
        }

        function clearError() {
            document.getElementById("error").textContent = "";
        }

        // ============================================
        // FRAME CAPTURE PIPELINE
        // ============================================

        class FrameCaptureEngine {
            constructor(videoElement, options = {}) {
                this.video = videoElement;
                this.captureInterval = options.interval || 200; // ms
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.previewCanvas = document.getElementById('previewCanvas');
                this.previewCtx = this.previewCanvas.getContext('2d');

                // Set canvas dimensions (lower resolution for performance)
                this.canvas.width = options.width || 640;
                this.canvas.height = options.height || 480;

                // State
                this.isCapturing = false;
                this.frameCount = 0;
                this.intervalId = null;
                this.startTime = null;
                this.lastCaptureTime = 0;
                this.totalCaptureTime = 0;

                console.log('[CAPTURE] Engine initialized -',
                    'Resolution:', this.canvas.width + 'x' + this.canvas.height,
                    'Interval:', this.captureInterval + 'ms');
            }

            start() {
                if (this.isCapturing) {
                    console.warn('[CAPTURE] Already capturing');
                    return;
                }

                // Check if video is ready
                if (!this.video.srcObject || this.video.readyState < 2) {
                    console.error('[CAPTURE] Video not ready');
                    updateCaptureStatus('Error: Video not ready');
                    return;
                }

                this.isCapturing = true;
                this.frameCount = 0;
                this.startTime = Date.now();
                this.totalCaptureTime = 0;

                console.log('[CAPTURE] Started capturing from video:', this.video.id);
                updateCaptureStatus('Capturing... (0 frames)');

                // Start capture loop
                this.intervalId = setInterval(() => {
                    this.captureFrame();
                }, this.captureInterval);
            }

            stop() {
                if (!this.isCapturing) {
                    console.warn('[CAPTURE] Not currently capturing');
                    return;
                }

                clearInterval(this.intervalId);
                this.isCapturing = false;

                const duration = ((Date.now() - this.startTime) / 1000).toFixed(2);
                const avgCaptureTime = this.frameCount > 0
                    ? (this.totalCaptureTime / this.frameCount).toFixed(2)
                    : 0;

                console.log('[CAPTURE] Stopped -',
                    'Total frames:', this.frameCount,
                    'Duration:', duration + 's',
                    'Avg capture time:', avgCaptureTime + 'ms');

                updateCaptureStatus(`Stopped - ${this.frameCount} frames captured in ${duration}s`);
            }

            captureFrame() {
                const captureStart = performance.now();

                try {
                    // Draw current video frame to canvas
                    this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);

                    this.frameCount++;
                    const captureTime = performance.now() - captureStart;
                    this.totalCaptureTime += captureTime;

                    // Get frame data in multiple formats
                    const frameData = {
                        frameNumber: this.frameCount,
                        timestamp: Date.now(),
                        captureTime: captureTime,

                        // Format 1: Base64 JPEG (for network transfer)
                        base64: this.canvas.toDataURL('image/jpeg', 0.8),

                        // Format 2: ImageData (raw pixels for AI)
                        imageData: this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height),

                        // Metadata
                        width: this.canvas.width,
                        height: this.canvas.height
                    };

                    // Log every 10th frame to avoid console spam
                    if (this.frameCount % 10 === 0) {
                        console.log('[CAPTURE] Frame #' + this.frameCount + ' -',
                            this.canvas.width + 'x' + this.canvas.height,
                            '-', frameData.imageData.data.length + ' bytes',
                            '- Capture time:', captureTime.toFixed(2) + 'ms');
                    }

                    // Update preview if enabled
                    if (document.getElementById('showPreviewCheck').checked) {
                        this.updatePreview();
                    }

                    // Update status
                    const avgTime = (this.totalCaptureTime / this.frameCount).toFixed(2);
                    updateCaptureStatus(`Capturing... (${this.frameCount} frames, avg: ${avgTime}ms)`);

                    // Process frame (send to AI processing queue)
                    this.processFrame(frameData);

                } catch (error) {
                    console.error('[CAPTURE] Frame capture error:', error);
                }
            }

            updatePreview() {
                // Draw captured frame to preview canvas
                this.previewCtx.drawImage(
                    this.canvas,
                    0, 0,
                    this.previewCanvas.width,
                    this.previewCanvas.height
                );
            }

            processFrame(frameData) {
                // This is where you would send frames to your AI model
                // For now, we'll just demonstrate the data formats available

                // Example 1: Send Base64 to server for AI processing
                // socket.emit('process-frame', { base64: frameData.base64 });

                // Example 2: Process locally with TensorFlow.js or similar
                // const tensor = tf.browser.fromPixels(frameData.imageData);
                // const prediction = await model.predict(tensor);

                // Example 3: Convert to normalized float array for ML models
                const normalizedData = this.getNormalizedPixels(frameData.imageData);

                // Log sample of normalized data (first 10 pixels) on first frame
                if (this.frameCount === 1) {
                    console.log('[CAPTURE] Sample normalized pixel data (first 10 RGB values):',
                        normalizedData.slice(0, 30));
                }

                // In production, you would:
                // 1. Add frames to a processing queue
                // 2. Send to AI model (local or remote)
                // 3. Handle results (moderation, analysis, etc.)
                // 4. Skip frames if queue is full (prevent memory overflow)
            }

            getNormalizedPixels(imageData) {
                // Convert pixel data (0-255) to normalized floats (0-1)
                // This is the format most AI models expect
                const normalized = new Float32Array(imageData.data.length);
                for (let i = 0; i < imageData.data.length; i++) {
                    normalized[i] = imageData.data[i] / 255.0;
                }
                return normalized;
            }

            getFrameAsBlob(callback) {
                // Convert canvas to Blob (useful for file operations)
                this.canvas.toBlob((blob) => {
                    callback(blob);
                }, 'image/jpeg', 0.8);
            }

            setInterval(interval) {
                this.captureInterval = interval;
                if (this.isCapturing) {
                    // Restart with new interval
                    this.stop();
                    this.start();
                }
                console.log('[CAPTURE] Interval updated to:', interval + 'ms');
            }
        }

        // Global capture engine instance
        let captureEngine = null;

        function startFrameCapture() {
            const videoElement = document.getElementById('localVideo');
            const interval = parseInt(document.getElementById('intervalInput').value);

            if (!videoElement.srcObject) {
                updateCaptureStatus('Error: Please join a room first');
                return;
            }

            // Create or reuse capture engine
            if (!captureEngine) {
                captureEngine = new FrameCaptureEngine(videoElement, {
                    interval: interval,
                    width: 640,
                    height: 480
                });
            } else {
                captureEngine.setInterval(interval);
            }

            captureEngine.start();

            // Update UI
            document.getElementById('startCaptureBtn').disabled = true;
            document.getElementById('stopCaptureBtn').disabled = false;
            document.getElementById('intervalInput').disabled = true;
        }

        function stopFrameCapture() {
            if (captureEngine) {
                captureEngine.stop();
            }

            // Update UI
            document.getElementById('startCaptureBtn').disabled = false;
            document.getElementById('stopCaptureBtn').disabled = true;
            document.getElementById('intervalInput').disabled = false;
        }

        function updateCaptureStatus(message) {
            document.getElementById('captureStatus').textContent = 'Status: ' + message;
        }

        // Optional: Capture from remote video instead
        function captureRemoteVideo() {
            const remoteVideo = document.getElementById('remoteVideo');
            if (captureEngine) {
                captureEngine.video = remoteVideo;
                console.log('[CAPTURE] Switched to remote video');
            }
        }

        // ============================================
        // AI VISUAL DETECTION PIPELINE
        // ============================================

        class AIDetectionEngine {
            constructor() {
                this.model = null;
                this.isLoading = false;
                this.isReady = false;
                this.detectionEnabled = false;
                this.inferenceQueue = [];
                this.isProcessing = false;
                this.threshold = 0.6; // 60% confidence threshold
                this.frameCount = 0;
                this.totalInferenceTime = 0;

                console.log('[AI] Detection engine initialized');
            }

            async loadModel() {
                if (this.isLoading || this.isReady) {
                    console.warn('[AI] Model already loaded or loading');
                    return;
                }

                this.isLoading = true;
                updateModelStatus('Loading model... (this may take a few seconds)');
                console.log('[AI] Starting model load...');

                try {
                    // Set TensorFlow.js backend to WebGL for GPU acceleration
                    await tf.setBackend('webgl');
                    await tf.ready();
                    console.log('[AI] TensorFlow.js backend:', tf.getBackend());

                    // Load NSFWJS model
                    const loadStart = performance.now();
                    this.model = await nsfwjs.load();
                    const loadTime = performance.now() - loadStart;

                    this.isReady = true;
                    this.isLoading = false;

                    console.log('[AI] Model loaded successfully in', loadTime.toFixed(2) + 'ms');
                    updateModelStatus('Model loaded and ready ✓');

                    // Enable detection button
                    document.getElementById('enableDetectionBtn').disabled = false;

                } catch (error) {
                    console.error('[AI] Model loading error:', error);
                    updateModelStatus('Error loading model: ' + error.message);
                    this.isLoading = false;
                }
            }

            async classifyFrame(canvas) {
                if (!this.isReady || !this.detectionEnabled) {
                    return null;
                }

                const inferenceStart = performance.now();

                try {
                    // Preprocess: resize to 224x224 (NSFWJS requirement)
                    const preprocessed = this.preprocessFrame(canvas);

                    // Convert to tensor
                    const tensor = tf.browser.fromPixels(preprocessed);

                    // Run inference
                    const predictions = await this.model.classify(tensor);

                    const inferenceTime = performance.now() - inferenceStart;
                    this.frameCount++;
                    this.totalInferenceTime += inferenceTime;

                    // Check if unsafe
                    const unsafe = this.isUnsafe(predictions);

                    // Log every 5th detection to avoid console spam
                    if (this.frameCount % 5 === 0) {
                        console.log('[AI] Frame #' + this.frameCount + ' -',
                            'Inference time:', inferenceTime.toFixed(2) + 'ms',
                            'Unsafe:', unsafe);
                        console.log('[AI] Predictions:', predictions);
                    }

                    // Display results
                    this.displayPredictions(predictions, unsafe, inferenceTime);

                    // Cleanup tensor to prevent memory leak
                    tensor.dispose();

                    return { predictions, unsafe, inferenceTime };

                } catch (error) {
                    console.error('[AI] Classification error:', error);
                    return null;
                }
            }

            preprocessFrame(canvas) {
                // Create temporary canvas for resizing
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 224;
                tempCanvas.height = 224;

                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0, 224, 224);

                return tempCanvas;
            }

            isUnsafe(predictions) {
                // Update threshold from UI
                this.threshold = parseFloat(document.getElementById('thresholdInput').value);

                // Check if any unsafe category exceeds threshold
                const unsafeCategories = ['Porn', 'Hentai', 'Sexy'];

                for (const pred of predictions) {
                    if (unsafeCategories.includes(pred.className) &&
                        pred.probability > this.threshold) {
                        return true;
                    }
                }

                return false;
            }

            displayPredictions(predictions, unsafe, inferenceTime) {
                const predictionsDiv = document.getElementById('predictions');

                // Sort by probability
                const sorted = [...predictions].sort((a, b) => b.probability - a.probability);

                // Create HTML for predictions
                let html = '';
                html += `<div style="color: ${unsafe ? 'red' : 'green'}; font-weight: bold; margin-bottom: 5px;">`;
                html += unsafe ? '⚠️ UNSAFE CONTENT DETECTED' : '✓ Content Safe';
                html += `</div>`;

                html += `<div style="font-size: 0.9em; color: #666; margin-bottom: 5px;">`;
                html += `Inference: ${inferenceTime.toFixed(2)}ms | Threshold: ${(this.threshold * 100).toFixed(0)}%`;
                html += `</div>`;

                sorted.forEach(pred => {
                    const percentage = (pred.probability * 100).toFixed(1);
                    const barWidth = pred.probability * 100;
                    const isHighlight = pred.probability > this.threshold &&
                        ['Porn', 'Hentai', 'Sexy'].includes(pred.className);

                    html += `<div style="margin: 3px 0;">`;
                    html += `<span style="display: inline-block; width: 80px; ${isHighlight ? 'color: red; font-weight: bold;' : ''}">${pred.className}:</span>`;
                    html += `<span style="display: inline-block; width: 50px;">${percentage}%</span>`;
                    html += `<div style="display: inline-block; width: 100px; height: 10px; background: #ddd; border-radius: 3px; vertical-align: middle;">`;
                    html += `<div style="width: ${barWidth}%; height: 100%; background: ${isHighlight ? 'red' : '#4CAF50'}; border-radius: 3px;"></div>`;
                    html += `</div>`;
                    html += `</div>`;
                });

                predictionsDiv.innerHTML = html;
            }

            enable() {
                this.detectionEnabled = true;
                console.log('[AI] Detection enabled');
            }

            disable() {
                this.detectionEnabled = false;
                console.log('[AI] Detection disabled');
            }

            getStats() {
                const avgInferenceTime = this.frameCount > 0
                    ? (this.totalInferenceTime / this.frameCount).toFixed(2)
                    : 0;

                return {
                    frameCount: this.frameCount,
                    avgInferenceTime: avgInferenceTime
                };
            }
        }

        // Global AI engine instance
        let aiEngine = null;

        async function loadAIModel() {
            if (!aiEngine) {
                aiEngine = new AIDetectionEngine();
            }

            await aiEngine.loadModel();
        }

        function toggleDetection() {
            if (!aiEngine || !aiEngine.isReady) {
                alert('Please load the AI model first');
                return;
            }

            const btn = document.getElementById('enableDetectionBtn');

            if (aiEngine.detectionEnabled) {
                aiEngine.disable();
                btn.textContent = 'Enable Detection';
                btn.style.background = '';
            } else {
                aiEngine.enable();
                btn.textContent = 'Disable Detection';
                btn.style.background = '#4CAF50';
                btn.style.color = 'white';
            }
        }

        function updateModelStatus(message) {
            document.getElementById('modelStatus').textContent = 'Model: ' + message;
        }

        // Modify FrameCaptureEngine to integrate with AI detection
        // We'll override the processFrame method
        const originalProcessFrame = FrameCaptureEngine.prototype.processFrame;

        FrameCaptureEngine.prototype.processFrame = function (frameData) {
            // Call original processing
            if (originalProcessFrame) {
                originalProcessFrame.call(this, frameData);
            }

            // Send to AI detection if enabled (process every 3rd frame to reduce load)
            if (aiEngine && aiEngine.isReady && aiEngine.detectionEnabled && this.frameCount % 3 === 0) {
                // Use the canvas directly for AI processing
                aiEngine.classifyFrame(this.canvas);
            }
        };
    </script>

</body>

</html>
